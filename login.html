<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - MST SIS</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        function checkInAppBrowser() {
            var ua = navigator.userAgent || navigator.vendor || window.opera;
            var isInApp = (ua.indexOf("FBAN") > -1) || (ua.indexOf("FBAV") > -1) || 
                          (ua.indexOf("Instagram") > -1) || (ua.indexOf("Line") > -1) || 
                          (ua.indexOf("LINE") > -1) || (ua.indexOf("TikTok") > -1);
            
            if(isInApp) {
                document.write(`
                    <div style="position:fixed; top:0; left:0; width:100vw; height:100vh; background:#f3e8ff; z-index:999999; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:20px; font-family:'Anuphan',sans-serif;">
                        <svg style="width:80px; color:#673ab7; margin-bottom:20px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                        <h2 style="color:#673ab7; font-weight:bold; margin-bottom:10px;">โปรดเปิดในเบราว์เซอร์หลัก</h2>
                        <p style="color:#555; font-size:16px; margin-bottom:30px;">การเข้าสู่ระบบด้วย Google ไม่รองรับการเปิดผ่านแอป LINE, Facebook หรือ IG<br><br>กรุณากดที่เมนู <b>(จุด 3 จุด)</b> มุมขวาบน<br>แล้วเลือก <b>"เปิดในเบราว์เซอร์" (Open in browser)</b></p>
                        <button onclick="navigator.clipboard.writeText(window.location.href); alert('คัดลอกลิงก์แล้ว! นำไปเปิดใน Safari หรือ Chrome ได้เลย');" style="background:#673ab7; color:white; border:none; padding:15px 30px; border-radius:30px; font-size:16px; font-weight:bold; box-shadow:0 4px 15px rgba(103,58,183,0.3);">คัดลอกลิงก์เว็บไซต์</button>
                    </div>
                `);
                document.close();
                window.stop(); 
            }
        }
        checkInAppBrowser();
    </script>

    <style>
        body { font-family: 'Anuphan', sans-serif; background-color: #f8fafc; }
        /* 🌟 เงาฟุ้งๆ ด้านหลังแบบมินิมอล (แทนขอบมน) */
        .minimal-shadow { box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08); }
        .animate-fade-in { animation: fadeIn 0.6s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen w-full flex items-center justify-center bg-slate-50 p-4">

    <div class="w-full max-w-md animate-fade-in">
        
        <div class="bg-white rounded-none p-10 text-center relative minimal-shadow border border-gray-100">
            
            <div class="relative z-10">
                <img src="https://i.postimg.cc/7YLmZkwG/Muang-ST2020.jpg" class="w-20 h-20 mx-auto drop-shadow-md mb-6 object-contain">
                
                <h1 class="text-2xl font-bold text-gray-900 tracking-tight mb-1">MST SIS</h1>
                <p class="text-xs text-gray-500 font-medium tracking-widest uppercase mb-10">โรงเรียนเมืองสุราษฎร์ธานี</p>

                <button id="btn-login" class="w-full bg-white hover:bg-slate-50 border border-gray-200 text-gray-800 font-bold py-3.5 rounded-none flex items-center justify-center gap-3 transition-colors shadow-sm hover:shadow">
                    <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5"> เข้าสู่ระบบด้วย @mst.ac.th
                </button>
                
                <div class="mt-6 inline-block text-indigo-600 px-4 py-2 text-[11px] font-semibold bg-indigo-50 border border-indigo-100">
                    <i class="fa-solid fa-lock mr-1"></i> ระบบสารสนเทศนักเรียน
                </div>
            </div>
            
        </div>
        
        <p class="text-center text-[10px] text-gray-400 mt-8 uppercase tracking-widest">
            &copy; 2026 Student Information System - Muangsuratthani School. All rights reserved.
        </p>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyCBNubZEzVbtdLXuQoadXNeDaEPMvCKGwU", authDomain: "mst-school.firebaseapp.com", projectId: "mst-school", storageBucket: "mst-school.firebasestorage.app", messagingSenderId: "674395320659", appId: "1:674395320659:web:74eca21ff2dfd9026af1a6" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        provider.setCustomParameters({ hd: "mst.ac.th" });

        onAuthStateChanged(auth, user => {
            if (user && user.email.endsWith("@mst.ac.th")) {
                const emailPrefix = user.email.split('@')[0];
                const studentId = emailPrefix.slice(-5);
                localStorage.setItem('studentId', studentId);
                localStorage.setItem('studentPic', user.photoURL);
                window.location.href = 'index.html';
            }
        });

        document.getElementById('btn-login').onclick = () => {
            signInWithPopup(auth, provider).then((result) => {
                const user = result.user;
                if (user.email.endsWith("@mst.ac.th")) {
                    const emailPrefix = user.email.split('@')[0];
                    const studentId = emailPrefix.slice(-5); 
                    localStorage.setItem('studentId', studentId);
                    localStorage.setItem('studentPic', user.photoURL);
                    window.location.href = 'index.html';
                } else {
                    auth.signOut();
                    Swal.fire({ icon: 'error', title: 'ไม่อนุญาต', text: 'ต้องใช้อีเมล @mst.ac.th เท่านั้น', confirmButtonColor: '#4f46e5' });
                }
            }).catch((error) => console.error(error));
        };
    </script>
</body>
</html>
